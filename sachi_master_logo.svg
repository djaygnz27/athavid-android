<svg width="900" height="360" viewBox="0 0 900 360" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="360" fill="#000000"/>

  <!-- ═══════════════════════════════════════════════
       ICON MARK — fluid S-wave in a circle
       ═══════════════════════════════════════════════ -->

  <!-- Outer circle background (subtle dark purple) -->
  <circle cx="90" cy="150" r="72" fill="#1A0A3C"/>

  <!-- The S-wave: a single confident stroke that reads as both S and wave -->
  <path d="
    M 58,110
    C 58,96  72,88  90,88
    C 108,88 122,96 122,108
    C 122,120 108,128 90,132
    C 72,136  58,144  58,158
    C 58,172  72,182  90,182
    C 108,182 122,172 122,158
  "
  stroke="#FBBF24" stroke-width="14" fill="none" stroke-linecap="round"/>

  <!-- Globe dot floating above the S -->
  <circle cx="130" cy="82" r="14" fill="#FBBF24"/>
  <!-- Latitude lines on globe -->
  <ellipse cx="130" cy="82" rx="14" ry="5" fill="none" stroke="#000" stroke-width="1.5"/>
  <ellipse cx="130" cy="75" rx="10" ry="3.5" fill="none" stroke="#000" stroke-width="1.2"/>
  <ellipse cx="130" cy="89" rx="10" ry="3.5" fill="none" stroke="#000" stroke-width="1.2"/>
  <!-- Vertical meridian -->
  <ellipse cx="130" cy="82" rx="5" ry="14" fill="none" stroke="#000" stroke-width="1.5"/>

  <!-- ═══════════════════════════════════════════════
       PRIMARY WORDMARK — SACHi
       ═══════════════════════════════════════════════ -->

  <text font-family="'Arial Black', 'Helvetica Neue', sans-serif" font-size="155" font-weight="900">
    <!-- S -->
    <tspan x="175" y="220" fill="#7C3AED">S</tspan>
    <!-- A -->
    <tspan fill="#7C3AED">A</tspan>
    <!-- C -->
    <tspan fill="#7C3AED">C</tspan>
    <!-- H -->
    <tspan fill="#7C3AED">H</tspan>
    <!-- i — no built-in dot, we overdraw with globe -->
    <tspan fill="#7C3AED">i</tspan>
  </text>

  <!-- Cover the default dot on i with black -->
  <rect x="648" y="48" width="60" height="48" fill="#000000"/>

  <!-- Globe dot on the i in SACHi -->
  <circle cx="672" cy="60" r="22" fill="#FBBF24"/>
  <ellipse cx="672" cy="60" rx="22" ry="7.5" fill="none" stroke="#7C3AED" stroke-width="2"/>
  <ellipse cx="672" cy="48" rx="16" ry="5" fill="none" stroke="#7C3AED" stroke-width="1.5"/>
  <ellipse cx="672" cy="72" rx="16" ry="5" fill="none" stroke="#7C3AED" stroke-width="1.5"/>
  <ellipse cx="672" cy="60" rx="8" ry="22" fill="none" stroke="#7C3AED" stroke-width="2"/>
  <circle cx="672" cy="60" r="22" fill="none" stroke="#7C3AED" stroke-width="2.5"/>

  <!-- S-wave crossbar on A in SACHi -->
  <!-- A is the 2nd letter, x~295, crossbar at y~145 -->
  <path d="M 302,148 C 320,124 340,172 358,148"
        stroke="#FBBF24" stroke-width="11" fill="none" stroke-linecap="round"/>

  <!-- ═══════════════════════════════════════════════
       SUB-BRAND — STREAM
       ═══════════════════════════════════════════════ -->

  <text font-family="'Arial Black', 'Helvetica Neue', sans-serif" font-size="72" font-weight="900" letter-spacing="12">
    <tspan x="175" y="308" fill="#FFFFFF">STREAM</tspan>
  </text>

  <!-- S-wave crossbar on A in STREAM -->
  <!-- A is 5th letter ~x=530, crossbar y~268 -->
  <path d="M 536,268 C 548,252 562,284 574,268"
        stroke="#FBBF24" stroke-width="7" fill="none" stroke-linecap="round"/>

  <!-- Thin gold rule separating icon from wordmark -->
  <line x1="162" y1="80" x2="162" y2="240" stroke="#FBBF24" stroke-width="1.5" opacity="0.4"/>

</svg>
