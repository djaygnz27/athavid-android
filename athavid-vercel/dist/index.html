    <script>
      // Service Worker — force-update any stale worker, then register the
      // current one. A plain hard refresh (Cmd+Shift+R) does NOT unregister
      // an already-active service worker still controlling the page — if an
      // old SW from before a fix was shipped is still running, it can keep
      // intercepting/breaking fetches indefinitely regardless of new deploys.
      // This block clears that class of bug once and for all.
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => {
          regs.forEach(reg => {
            // Force this registration to check for a byte-different sw.js
            // immediately instead of waiting for the browser's lazy check.
            reg.update().catch(() => {});
          });
        });
        navigator.serviceWorker.register('/sw.js').then(reg => {
          // If a new SW is waiting (installed but not yet active because an
          // old one still controls the page), activate it immediately.
          if (reg.waiting) {
            reg.waiting.postMessage({ type: 'SKIP_WAITING' });
          }
          reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            if (newWorker) {
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  newWorker.postMessage({ type: 'SKIP_WAITING' });
                }
              });
            }
          });
        }).catch(() => {});

        // Reload once (and only once) if the controlling worker changes.
        // CRITICAL: use sessionStorage, NOT a local variable — a local var
        // resets on every page reload, so if Safari fires controllerchange
        // again after the reload (which it can when clients.claim() runs),
        // it creates an infinite reload loop → Safari kills the tab with
        // "This webpage was reloaded" crash. sessionStorage persists across
        // the reload, breaking the loop after exactly one refresh.
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (sessionStorage.getItem('sachi-sw-refreshed')) return;
          sessionStorage.setItem('sachi-sw-refreshed', '1');
          window.location.reload();
        });
      }
    </script>
