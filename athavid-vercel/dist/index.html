<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Sachi — Your Stage</title>
    <meta name="application-name" content="Sachi" />
    <meta name="description" content="Your stage. Share short videos with the world." />
    <meta name="theme-color" content="#0B0C1A" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sachi" />
    <link rel="icon" type="image/png" href="/sachi-logo-512.png?v=3" />
    <link rel="apple-touch-icon" href="/sachi-logo-512.png?v=3" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #0B0C1A; }
      #splash {
        position: fixed;
        inset: 0;
        background: #0B0C1A;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        z-index: 99999;
        transition: opacity 0.5s ease;
      }
      #splash img {
        width: 100px;
        height: 100px;
        border-radius: 22px;
        animation: glow 1.8s ease-in-out infinite;
      }
      #splash-name {
        font-family: Georgia, 'Times New Roman', serif;
        font-size: 38px;
        font-weight: 700;
        color: #F5C842;
        letter-spacing: -0.5px;
      }
      #splash-name sup {
        font-size: 14px;
        font-weight: 400;
        vertical-align: super;
        color: #F5C842;
      }
      #splash-tagline {
        font-family: -apple-system, sans-serif;
        font-size: 11px;
        color: rgba(245,200,66,0.4);
        letter-spacing: 3px;
        text-transform: uppercase;
      }
      @keyframes glow {
        0%, 100% { opacity: 1; filter: drop-shadow(0 0 12px rgba(245,200,66,0.4)); }
        50% { opacity: 0.85; filter: drop-shadow(0 0 24px rgba(245,200,66,0.7)); }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <img src="/sachi-logo-512.png?v=3" alt="Sachi" />
      <div id="splash-name">sachi<sup>™</sup></div>
      <div id="splash-tagline">your stage</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/assets/sachi-2d738d7e.js"></script>
    <script>
      window.addEventListener('load', function() {
        setTimeout(function() {
          var s = document.getElementById('splash');
          if (s) { s.style.opacity = '0'; setTimeout(function(){ if(s.parentNode) s.parentNode.removeChild(s); }, 500); }
        }, 800);
      });
    </script>
  </body>
</html>
