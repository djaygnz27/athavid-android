<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Sachi — Your Stage</title>

    <!-- PWA Meta Tags -->
    <meta name="application-name" content="Sachi" />
    <meta name="description" content="Your stage. Share short videos with the world." />
    <meta name="theme-color" content="#ff6b6b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sachi" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/icon-192.png" />

    <script>
      // Register service worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(() => console.log('SW registered'))
            .catch(err => console.log('SW error:', err));
        });
      }
    </script>

    <style>
      body { margin: 0; background: #0f0f1a; }

      /* Install Banner */
      #install-banner {
        display: none;
        position: fixed;
        bottom: 72px;
        left: 12px;
        right: 12px;
        background: linear-gradient(135deg, #ff6b6b, #ff8e53);
        border-radius: 16px;
        padding: 14px 16px;
        align-items: center;
        justify-content: space-between;
        z-index: 99999;
        box-shadow: 0 8px 30px rgba(255,107,107,0.5);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        animation: slideUp 0.3s ease;
      }
      @keyframes slideUp {
        from { transform: translateY(100px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      #install-banner .b-left { display: flex; align-items: center; gap: 10px; }
      #install-banner .b-icon { font-size: 28px; }
      #install-banner .b-title { color: #fff; font-size: 14px; font-weight: 800; }
      #install-banner .b-sub { color: rgba(255,255,255,0.85); font-size: 11px; margin-top: 1px; }
      #install-banner .b-right { display: flex; align-items: center; gap: 6px; }
      #install-banner .btn-install {
        background: #fff;
        color: #ff6b6b;
        border: none;
        border-radius: 20px;
        padding: 8px 16px;
        font-weight: 800;
        font-size: 13px;
        cursor: pointer;
      }
      #install-banner .btn-close {
        background: rgba(255,255,255,0.2);
        color: #fff;
        border: none;
        border-radius: 50%;
        width: 28px;
        height: 28px;
        font-size: 14px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* First-time welcome popup */
      #welcome-popup {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.88);
        z-index: 999998;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      .welcome-box {
        background: linear-gradient(160deg, #1a1a2e, #16213e);
        border-radius: 24px;
        padding: 32px 24px 24px;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,107,107,0.25);
        text-align: center;
        box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      }
      .welcome-box img { width: 72px; height: 72px; border-radius: 18px; margin-bottom: 14px; box-shadow: 0 6px 20px rgba(255,107,107,0.4); }
      .welcome-box h2 { color: #ff6b6b; margin: 0 0 6px; font-size: 22px; }
      .welcome-box .tagline { color: #888; font-size: 13px; margin: 0 0 20px; }
      .welcome-box .install-hint {
        background: rgba(107,255,154,0.08);
        border: 1px solid rgba(107,255,154,0.2);
        border-radius: 14px;
        padding: 14px;
        margin-bottom: 18px;
        color: #ccc;
        font-size: 13px;
        line-height: 1.7;
        text-align: left;
      }
      .welcome-box .install-hint strong { color: #6bff9a; }
      .btn-welcome-install {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #ff6b6b, #ff8e53);
        color: #fff;
        font-weight: 800;
        font-size: 15px;
        border: none;
        border-radius: 14px;
        cursor: pointer;
        margin-bottom: 10px;
      }
      .btn-welcome-skip {
        width: 100%;
        padding: 11px;
        background: transparent;
        color: #555;
        font-size: 13px;
        border: none;
        cursor: pointer;
      }

      /* Manual install popup */
      #manual-install {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.85);
        z-index: 999999;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      #manual-install.show { display: flex; }
      .manual-box {
        background: #1a1a2e;
        border-radius: 20px;
        padding: 28px 24px;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,107,107,0.3);
      }
      .manual-box h3 { color: #ff6b6b; margin: 0 0 16px; font-size: 18px; }
      .manual-step { color: #ccc; font-size: 14px; line-height: 2; margin-bottom: 8px; }
      .manual-step strong { color: #fff; }
      .tab-btns { display: flex; gap: 8px; margin-bottom: 16px; }
      .tab-btn { flex: 1; padding: 8px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.15); background: transparent; color: #888; font-size: 13px; cursor: pointer; }
      .tab-btn.active { background: rgba(255,107,107,0.2); border-color: #ff6b6b; color: #ff6b6b; font-weight: 700; }
      .close-manual { width: 100%; margin-top: 16px; padding: 12px; background: rgba(255,255,255,0.07); border: none; border-radius: 12px; color: #888; font-size: 14px; cursor: pointer; }
    </style>
    <script type="module" crossorigin src="/assets/index-BAJPaC-q.js"></script>
  </head>
  <body>
    <div id="root"></div>
      </div>
      <div class="b-right">
        <button class="btn-install" onclick="installApp()">Install</button>
        <button class="btn-close" onclick="hideBanner()">✕</button>
      </div>
    </div>
        <button class="close-manual" onclick="document.getElementById('manual-install').style.display='none'" style="background:linear-gradient(135deg,#ff6b6b,#ff8e53);color:#fff;font-weight:800;border-radius:14px;border:none;padding:14px;width:100%;font-size:15px;cursor:pointer;margin-top:8px;">
          Got it — I'll do it now 👍
        </button>
      </div>
    </div>

    <script>
      // First-time welcome
      window.addEventListener('load', () => {
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
        const seen = localStorage.getItem('sachi_welcomed');
        if (!seen && !isStandalone) {
          setTimeout(() => {
            const wp = document.getElementById('welcome-popup');
            if (wp) wp.style.display = 'flex';
          }, 1500);
        }
      });

      function dismissWelcome(showInstall) {
        localStorage.setItem('sachi_welcomed', '1');
        document.getElementById('welcome-popup').style.display = 'none';
        if (showInstall) {
          setTimeout(() => window.showInstallInstructions && window.showInstallInstructions(), 200);
        }
      }

      function showTab(tab, btn) {
        document.getElementById('tab-android').style.display = tab === 'android' ? 'block' : 'none';
        document.getElementById('tab-iphone').style.display = tab === 'iphone' ? 'block' : 'none';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      }
      // Expose for React app to call
      window.showInstallInstructions = () => {
        document.getElementById('manual-install').style.display = 'flex';
      };
    </script>

  </body>
</html>
