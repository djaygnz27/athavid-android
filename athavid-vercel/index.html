<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Sachi — Your Stage</title>

    <!-- PWA Meta Tags -->
    <meta name="application-name" content="Sachi" />
    <meta name="google-signin-client_id" content="200749117149-l9litb11sb8aanco05im228chukbf0o6.apps.googleusercontent.com" />
    <meta name="description" content="Your stage. Share short videos with the world." />
    <meta name="theme-color" content="#0B0C1A" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sachi" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/sachi-logo-512.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/sachi-logo-512.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" href="/sachi-logo-512.png" />

    <style>
      body { margin: 0; background: #0B0C1A; }
      #splash {
        position: fixed;
        inset: 0;
        background: #0B0C1A;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        z-index: 99999;
        transition: opacity 0.4s ease;
      }
      #splash img {
        width: 90px;
        height: 90px;
        border-radius: 20px;
        animation: pulse 1.6s ease-in-out infinite;
      }
      #splash-text {
        font-family: Georgia, serif;
        font-size: 36px;
        font-weight: 700;
        color: #F5C842;
        letter-spacing: -0.5px;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.8; transform: scale(0.96); }
      }
    </style>
  </head>
  <body>
    <!-- Inline splash shown while JS loads -->
    <div id="splash">
      <img src="/sachi-logo-512.png" alt="Sachi" />
      <div id="splash-text">sachi</div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Hide splash once React mounts
      window.addEventListener('load', function() {
        setTimeout(function() {
          var s = document.getElementById('splash');
          if (s) { s.style.opacity = '0'; setTimeout(function(){ s.remove(); }, 400); }
        }, 600);
      });
    </script>
  </body>
</html>
