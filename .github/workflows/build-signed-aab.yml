name: Build Signed AAB for Google Play

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @capacitor/core@6 @capacitor/android@6 @capacitor/cli@6

      - name: Create dist folder with index.html
        run: |
          mkdir -p dist
          echo '<html><body>Sachi</body></html>' > dist/index.html

      - name: Init Capacitor if needed
        run: |
          if [ ! -f "capacitor.config.json" ]; then
            npx cap init Sachi com.ldna.sachi --web-dir dist
          fi

      - name: Add android platform if missing
        run: |
          if [ ! -f "android/app/build.gradle" ]; then
            npx cap add android
          else
            echo "Android platform already exists, skipping add"
          fi

      - name: Copy web assets to android
        run: npx cap copy android

      - name: Set versionCode to 2
        run: |
          GRADLE=android/app/build.gradle
          sed -i 's/versionCode [0-9]*/versionCode 2/' $GRADLE
          sed -i 's/versionName "[^"]*"/versionName "1.0.1"/' $GRADLE
          echo "--- build.gradle version lines ---"
          grep -E "versionCode|versionName" $GRADLE

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/sachi-upload-key.jks

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build signed AAB
        run: |
          cd android && ./gradlew bundleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/sachi-upload-key.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: sachi-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
