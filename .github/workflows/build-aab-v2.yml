name: Build AAB v2

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: android-actions/setup-android@v3

      - name: Install dependencies and sync Capacitor
        run: |
          cd athavid-vercel
          npm install
          npm install @capacitor/cli @capacitor/core @capacitor/android
          npx cap sync android

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > sachi-upload-key.jks

      - name: Make gradlew executable
        run: chmod +x athavid-vercel/android/gradlew

      - name: Build signed AAB
        run: |
          cd athavid-vercel/android && ./gradlew bundleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/sachi-upload-key.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: sachi-release-aab
          path: athavid-vercel/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
